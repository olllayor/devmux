name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate tag matches package version
        run: |
          python - <<'PY'
          import os
          import tomllib

          with open("pyproject.toml", "rb") as pyproject_file:
              version = tomllib.load(pyproject_file)["project"]["version"]

          tag_name = os.environ["GITHUB_REF_NAME"]
          expected_tag = f"v{version}"

          if tag_name != expected_tag:
              raise SystemExit(
                  f"Tag {tag_name!r} does not match pyproject version {version!r}. "
                  f"Expected {expected_tag!r}."
              )

          print(f"Validated release tag {tag_name} for package version {version}.")
          PY

      - name: Install build tools
        run: python -m pip install --upgrade build

      - name: Build distributions
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          append_body: true
          body: |
            ## Install

            ```bash
            python3 -m pip install devmux
            ```

            ## Quick start

            ```bash
            devmux init --preset backend
            devmux start backend
            ```

  publish:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/p/devmux
    permissions:
      id-token: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
